<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>StageCommand - Confidence Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .current {
            flex: 2;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-bottom: 4px solid #e94560;
        }
        .current-label {
            font-size: 24px;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }
        .current-name {
            font-size: 72px;
            font-weight: bold;
            text-align: center;
        }
        .current-timer {
            font-size: 96px;
            color: #22c55e;
            font-family: monospace;
            margin-top: 20px;
        }
        .next {
            flex: 1;
            background: #16213e;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border-bottom: 2px solid #0f3460;
        }
        .next-label {
            font-size: 18px;
            color: #888;
            text-transform: uppercase;
            margin-right: 20px;
        }
        .next-name {
            font-size: 36px;
            color: #60a5fa;
        }
        .cues {
            flex: 1;
            background: #0f172a;
            padding: 30px;
            overflow-y: auto;
        }
        .cue {
            padding: 15px;
            margin: 10px 0;
            background: #1e293b;
            border-left: 4px solid #e94560;
            font-size: 24px;
        }
        .cue-time {
            color: #e94560;
            font-weight: bold;
            margin-right: 15px;
        }
        .status-bar {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #22c55e;
            color: #000;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }
        .standby { background: #f59e0b !important; color: #000 !important; }
        .go { background: #22c55e !important; color: #000 !important; }
    </style>
</head>
<body>

<div class="status-bar" id="status">LIVE</div>

<div class="current">
    <div class="current-label">Current Sequence</div>
    <div class="current-name" id="current-name">Loading...</div>
    <div class="current-timer" id="timer">00:00</div>
</div>

<div class="next">
    <span class="next-label">Next:</span>
    <span class="next-name" id="next-name">--</span>
</div>

<div class="cues" id="cues">
    <div style="color: #666; text-align: center; padding: 40px;">Waiting for show data...</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAmFrDXcHLhosgxbUwHRCuvibc2CR597Kw",
  authDomain: "stagecommand.firebaseapp.com",
  databaseURL: "https://stagecommand-default-rtdb.firebaseio.com",
  projectId: "stagecommand",
  storageBucket: "stagecommand.firebasestorage.app",
  messagingSenderId: "508387537732",
  appId: "1:508387537732:web:7c0d4960aa2961210e87d11",
  measurementId: "G-44BHPGHMC1"
};

firebase.initializeApp(firebaseConfig);
const showRef = firebase.database().ref('show');

let timerInterval;
let startTime = null;

showRef.on('value', snap => {
    const data = snap.val() || {};
    const sequences = Object.values(data.sequences || {});
    const currentIndex = data.currentSequence || 0;
    
    const current = sequences[currentIndex];
    const next = sequences[currentIndex + 1];
    
    // Current
    document.getElementById('current-name').textContent = current ? current.name : 'SHOW END';
    
    // Next
    document.getElementById('next-name').textContent = next ? next.name : '--';
    
    // Timer
    clearInterval(timerInterval);
    if (current) {
        startTime = Date.now();
        const duration = (current.duration || 5) * 60 * 1000;
        timerInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const remaining = duration - elapsed;
            const abs = Math.abs(remaining);
            const mins = Math.floor(abs / 60000);
            const secs = Math.floor((abs % 60000) / 1000);
            const sign = remaining < 0 ? '-' : '';
            document.getElementById('timer').textContent = 
                `${sign}${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }, 1000);
    }
    
    // Cues
    const cuesDiv = document.getElementById('cues');
    if (current && current.cues) {
        const cues = Object.values(current.cues);
        cuesDiv.innerHTML = cues.length === 0 
            ? '<div style="color: #666; text-align: center;">No cues</div>'
            : cues.map(c => `
                <div class="cue">
                    <span class="cue-time">${c.time || '0:00'}</span>
                    ${c.action || ''}
                </div>
            `).join('');
    } else {
        cuesDiv.innerHTML = '<div style="color: #666; text-align: center;">No cues for this sequence</div>';
    }
});
</script>

</body>
</html>
